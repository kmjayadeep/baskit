name: Build Flutter APK and App Bundle

on:
  push:
    branches: [main, master]
    tags:
      - "v*" # Trigger on version tags like v1.0.0, v1.0.1, etc.
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get Flutter dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Analyze Flutter code
        working-directory: ./app
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: ./app
        run: flutter test

  debug-apk:
    if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('app/android/**/build.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Pub dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: r28c
          add-to-path: false
          local-cache: true

      - name: Get Flutter dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Build Debug APK
        working-directory: ./app
        run: flutter build apk --debug --target-platform android-arm64

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('app/android/**/build.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Pub dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: r28c
          add-to-path: false
          local-cache: true

      - name: Setup Release Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          for required_secret in RELEASE_KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_PASSWORD KEY_ALIAS; do
            if [ -z "${!required_secret}" ]; then
              echo "::error::Missing required signing secret: ${required_secret}"
              exit 1
            fi
          done
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/keystore.jks"
          {
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=%s\n' "${{ runner.temp }}/keystore.jks"
          } > app/android/key.properties

      - name: Get Flutter dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Build Release APK
        working-directory: ./app
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Build Release App Bundle
        working-directory: ./app
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: "com.cboxlab.baskit"
          subject-path: "app/build/app/outputs/bundle/release/app-release.aab , app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release-apk
          path: app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload Release App Bundle as Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release-aab
          path: app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Debug Symbols as Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: debug-symbols
          path: app/build/app/outputs/symbols/
          retention-days: 30

      - name: Package Debug Symbols
        working-directory: ./app
        run: |
          cd build/app/outputs/symbols
          zip -r ../../../../debug-symbols.zip .
          cd ../../../../

      - name: Clean up keystore files
        if: always()
        run: |
          rm -f ${{ runner.temp }}/keystore.jks
          rm -f app/android/key.properties

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          artifacts: |
            app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            app/build/app/outputs/bundle/release/app-release.aab
            app/debug-symbols.zip
          name: Baskit ${{ github.ref_name }}
          body: |
            ## Downloads
            - **APK**: Direct install for modern Android devices (`app-arm64-v8a-release.apk`)
            - **App Bundle**: Google Play Store ready (`app-release.aab`)
            - **Debug Symbols**: Crash reporting (`debug-symbols.zip`)

            **Build**: Flutter 3.41.6, Release signed, Obfuscated | **Commit**: ${{ github.sha }}
          generateReleaseNotes: true

  play-internal:
    name: Upload release bundle to Play internal
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6.0.2

      - name: Verify tag matches app version
        run: |
          set -euo pipefail
          pubspec_version=$(grep '^version:' app/pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pubspec_version" != "$tag_version" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME does not match app/pubspec.yaml version $pubspec_version. Use ./scripts/release.sh to create release tags."
            exit 1
          fi

      - name: Download release app bundle artifact
        uses: actions/download-artifact@v7
        with:
          name: app-release-aab
          path: play-upload

      - name: Export Play release notes
        run: |
          set -euo pipefail
          notes_source="app/assets/whats_new/releases.json"
          if [ ! -f "$notes_source" ]; then
            notes_source="app/assets/whats_new/latest.json"
          fi
          scripts/export_play_release_notes.py \
            --source "$notes_source" \
            --pubspec app/pubspec.yaml \
            --allow-empty \
            --play-output play-upload/whatsnew-en-US \
            --markdown-output play-upload/release-notes/whats-new.md

      - name: Upload app bundle to Google Play internal track
        # r0adkll/upload-google-play v1
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cboxlab.baskit
          releaseFiles: play-upload/app-release.aab
          tracks: internal
          status: completed
          whatsNewDirectory: play-upload

      - name: Summarize Play internal upload
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          Uploaded `${{ github.ref_name }}` to the Google Play internal track.

          Promote from internal to closed/open/production in Play Console after smoke testing.
          EOF
