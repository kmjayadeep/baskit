name: Build Flutter APK and App Bundle

on:
  push:
    branches: [main, master]
    tags:
      - "v*" # Trigger on version tags like v1.0.0, v1.0.1, etc.
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v6.1.0
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get Flutter dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Analyze Flutter code
        working-directory: ./app
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: ./app
        run: flutter test

  fast-apk:
    name: Build fast APK for device testing
    if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('app/android/**/build.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Pub dependencies
        uses: actions/cache@v6.1.0
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: r28c
          add-to-path: false
          local-cache: true

      - name: Get Flutter dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Build Fast Debug APK
        working-directory: ./app
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload Fast Debug APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-fast-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  signed-test-apk:
    name: Build signed APK for auth testing
    if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Check release signing secrets
        id: signing-secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          missing=0
          for required_secret in RELEASE_KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_PASSWORD KEY_ALIAS; do
            if [ -z "${!required_secret}" ]; then
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
            Signed test APK skipped because release signing secrets are not fully configured.

            The debug APK artifact is still available for quick non-auth smoke testing. Configure release signing secrets to produce a signed APK that can exercise Google Sign-In without creating a GitHub Release or Play upload.
          EOF
          fi

      - name: Setup Java
        if: ${{ steps.signing-secrets.outputs.available == 'true' }}
        uses: actions/setup-java@v5.4.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        if: ${{ steps.signing-secrets.outputs.available == 'true' }}
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Cache Gradle dependencies
        if: ${{ steps.signing-secrets.outputs.available == 'true' }}
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('app/android/**/build.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Pub dependencies
        if: ${{ steps.signing-secrets.outputs.available == 'true' }}
        uses: actions/cache@v6.1.0
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Android NDK
        if: ${{ steps.signing-secrets.outputs.available == 'true' }}
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: r28c
          add-to-path: false
          local-cache: true

      - name: Setup release signing for test APK
        if: ${{ steps.signing-secrets.outputs.available == 'true' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/keystore.jks"
          {
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=%s\n' "${{ runner.temp }}/keystore.jks"
          } > app/android/key.properties

      - name: Get Flutter dependencies
        if: ${{ steps.signing-secrets.outputs.available == 'true' }}
        working-directory: ./app
        run: flutter pub get

      - name: Build signed test APK
        if: ${{ steps.signing-secrets.outputs.available == 'true' }}
        working-directory: ./app
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload signed test APK
        if: ${{ steps.signing-secrets.outputs.available == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-signed-test-apk
          path: app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 7

      - name: Clean up keystore files
        if: always()
        run: |
          rm -f ${{ runner.temp }}/keystore.jks
          rm -f app/android/key.properties

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('app/android/**/build.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Pub dependencies
        uses: actions/cache@v6.1.0
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: r28c
          add-to-path: false
          local-cache: true

      - name: Setup Release Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          for required_secret in RELEASE_KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_PASSWORD KEY_ALIAS; do
            if [ -z "${!required_secret}" ]; then
              echo "::error::Missing required signing secret: ${required_secret}"
              exit 1
            fi
          done
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/keystore.jks"
          {
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=%s\n' "${{ runner.temp }}/keystore.jks"
          } > app/android/key.properties

      - name: Get Flutter dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Build Release APK
        working-directory: ./app
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release-apk
          path: app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Build Release App Bundle
        working-directory: ./app
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: "com.cboxlab.baskit"
          subject-path: "app/build/app/outputs/bundle/release/app-release.aab , app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"

      - name: Upload Release App Bundle as Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release-aab
          path: app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Dart Debug Symbols as Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: debug-symbols
          path: app/build/app/outputs/symbols/
          retention-days: 30

      - name: Upload Native Debug Symbols as Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: native-debug-symbols
          path: app/build/app/outputs/native-debug-symbols/release/native-debug-symbols.zip
          retention-days: 30

      - name: Package Debug Symbols
        working-directory: ./app
        run: |
          cd build/app/outputs/symbols
          zip -r ../../../../debug-symbols.zip .
          cd ../../../../

      - name: Export Play release notes
        run: |
          set -euo pipefail
          notes_source="app/assets/whats_new/releases.json"
          if [ ! -f "$notes_source" ]; then
            notes_source="app/assets/whats_new/latest.json"
          fi
          scripts/export_play_release_notes.py \
            --source "$notes_source" \
            --pubspec app/pubspec.yaml \
            --allow-empty \
            --play-output app/release-notes/play/whatsnew-en-GB \
            --markdown-output app/release-notes/whats-new.md

      - name: Upload Release Notes as Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-notes
          path: app/release-notes/
          retention-days: 30

      - name: Clean up keystore files
        if: always()
        run: |
          rm -f ${{ runner.temp }}/keystore.jks
          rm -f app/android/key.properties

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          artifacts: |
            app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            app/build/app/outputs/bundle/release/app-release.aab
            app/debug-symbols.zip
            app/build/app/outputs/native-debug-symbols/release/native-debug-symbols.zip
            app/release-notes/play/whatsnew-en-GB
            app/release-notes/whats-new.md
          name: Baskit ${{ github.ref_name }}
          body: |
            ## Downloads
            - **APK**: Direct install for modern Android devices (`app-arm64-v8a-release.apk`)
            - **App Bundle**: Google Play Store ready (`app-release.aab`)
            - **Dart Debug Symbols**: Crash reporting (`debug-symbols.zip`)
            - **Native Debug Symbols**: Play Console native symbols (`native-debug-symbols.zip`)
            - **Release Notes**: GitHub/Play release notes (`whats-new.md`, `whatsnew-en-GB`)

            **Build**: Flutter 3.41.6, Release signed, Obfuscated | **Commit**: ${{ github.sha }}
          generateReleaseNotes: true

  play-internal:
    name: Upload release bundle to Play internal
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7.0.0

      - name: Verify tag matches app version
        run: |
          set -euo pipefail
          pubspec_version=$(grep '^version:' app/pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pubspec_version" != "$tag_version" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME does not match app/pubspec.yaml version $pubspec_version. Use ./scripts/release.sh to create release tags."
            exit 1
          fi

      - name: Check Play upload credentials
        id: play-secrets
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
            Google Play internal upload skipped because `PLAY_SERVICE_ACCOUNT_JSON` is not configured.

            The signed AAB, debug symbols, release notes, GitHub Release, and job logs remain the release record. Configure the secret and rerun this workflow for the tag to upload to the Play internal track.
          EOF
          fi

      - name: Download release app bundle artifact
        if: ${{ steps.play-secrets.outputs.available == 'true' }}
        uses: actions/download-artifact@v8.0.1
        with:
          name: app-release-aab
          path: play-upload

      - name: Download native debug symbols artifact
        if: ${{ steps.play-secrets.outputs.available == 'true' }}
        uses: actions/download-artifact@v8.0.1
        with:
          name: native-debug-symbols
          path: play-upload/native-debug-symbols

      - name: Download release notes artifact
        if: ${{ steps.play-secrets.outputs.available == 'true' }}
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-notes
          path: play-upload/release-notes

      - name: Upload app bundle to Google Play internal track
        if: ${{ steps.play-secrets.outputs.available == 'true' }}
        # r0adkll/upload-google-play v1
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cboxlab.baskit
          releaseFiles: play-upload/app-release.aab
          tracks: internal
          status: completed
          whatsNewDirectory: play-upload/release-notes/play
          debugSymbols: play-upload/native-debug-symbols/native-debug-symbols.zip

      - name: Summarize Play internal upload
        if: ${{ steps.play-secrets.outputs.available == 'true' }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          Uploaded `${{ github.ref_name }}` to the Google Play internal track.

          Promote from internal to closed/open/production in Play Console after smoke testing.
          EOF
